name: Stampa L'Eco del Galoppo

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  stampa:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Preleva i file della redazione
      uses: actions/checkout@v4

    - name: Imposta Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Pulisci ambiente e Installa dipendenze
      run: |
        python -m pip install --upgrade pip
        pip cache purge
        pip install -r requirements.txt
        pip install -U undetected-chromedriver selenium
        
    - name: Installa Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        # Scarichiamo il driver specifico per la versione 150 (la stessa del browser)
        wget -N https://storage.googleapis.com/chrome-for-testing-public/150.0.7871.0/linux64/chromedriver-linux64.zip -P ~/
        unzip ~/chromedriver-linux64.zip -d ~/
        # Spostiamo il driver in una posizione nota e diamo i permessi
        sudo mv ~/chromedriver-linux64/chromedriver /usr/bin/chromedriver
        sudo chmod +x /usr/bin/chromedriver

    - name: Rimuovi driver in cache (Sblocca versione)
      run: |
        rm -rf ~/.cache/undetected-chromedriver
        rm -rf ~/.wdm

    - name: Avvia le rotative
      run: python finale.py

    - name: Pubblica edizione
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        keep_files: false
