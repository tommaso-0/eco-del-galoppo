name: Stampa L'Eco del Galoppo

on:
  schedule:
    - cron: '0 5 * * *'  # Ogni mattina alle 5:00 UTC
  workflow_dispatch:

jobs:
  stampa:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Preleva i file
      uses: actions/checkout@v4

    - name: Imposta Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installa dipendenze
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Avvia le rotative
      run: python finale.py

    - name: Pubblica su GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        keep_files: false
