name: La Vedetta del Galoppo

on:
  schedule:
    # Esegue il controllo ogni mattina alle 08:00 UTC (le 10:00 in Italia)
    - cron: '0 8 * * *'
  # Il workflow_dispatch aggiunge un pulsante magico su GitHub per avviarlo a mano quando vuoi!
  workflow_dispatch: 

jobs:
  esplorazione:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installa le dipendenze
      run: |
        pip install requests google-generativeai

    - name: Lancia la Vedetta
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python vedetta.py
